<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0800"/>
      <stop offset="100%" style="stop-color:#0D0D0F"/>
    </linearGradient>
    <linearGradient id="glass" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7ecbf7;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#4ECDC4;stop-opacity:0.7"/>
    </linearGradient>
  </defs>
  <!-- Fundo -->
  <rect width="192" height="192" rx="38" fill="url(#bg)"/>
  <!-- Borda laranja sutil -->
  <rect width="192" height="192" rx="38" fill="none" stroke="#FF6B35" stroke-width="6" stroke-opacity="0.5"/>
  <!-- Forno industrial (trapézio) -->
  <path d="M40 130 L55 70 L137 70 L152 130 Z" fill="#FF6B35" opacity="0.18"/>
  <path d="M40 130 L55 70 L137 70 L152 130 Z" fill="none" stroke="#FF6B35" stroke-width="3"/>
  <!-- Chama interior -->
  <ellipse cx="96" cy="110" rx="28" ry="20" fill="#FF6B35" opacity="0.35"/>
  <ellipse cx="96" cy="108" rx="16" ry="13" fill="#FFD700" opacity="0.5"/>
  <!-- Painel de vidro (losango estilizado) -->
  <rect x="68" y="52" width="56" height="40" rx="4" fill="url(#glass)" opacity="0.85" transform="rotate(-8 96 72)"/>
  <rect x="68" y="52" width="56" height="40" rx="4" fill="none" stroke="#4ECDC4" stroke-width="2" transform="rotate(-8 96 72)"/>
  <!-- Reflexo vidro -->
  <rect x="74" y="55" width="18" height="6" rx="2" fill="white" opacity="0.4" transform="rotate(-8 96 72)"/>
  <!-- Texto GL -->
  <text x="96" y="168" text-anchor="middle" font-family="Trebuchet MS, sans-serif" font-weight="900" font-size="22" fill="#FF6B35" letter-spacing="4">GLASS</text>
  <text x="96" y="185" text-anchor="middle" font-family="Trebuchet MS, sans-serif" font-weight="900" font-size="14" fill="#4ECDC4" letter-spacing="6">LANG</text>
</svg>