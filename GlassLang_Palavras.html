<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#FF6B35">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="GlassLang Palavras">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<title>GlassLang · 1500 Palavras</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0D0D0F;color:#E8E8E8;font-family:'Trebuchet MS',sans-serif;min-height:100vh;padding-bottom:80px;}
.header{background:linear-gradient(135deg,#1a0800 0%,#0D0D0F 70%);border-bottom:1px solid rgba(255,107,53,0.2);padding:16px 14px 12px;}
.header-top{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
h1{font-size:19px;font-weight:900;color:#FF6B35;letter-spacing:2px;text-transform:uppercase;}
.header-sub{font-size:10px;color:#555;letter-spacing:1px;text-transform:uppercase;margin-top:1px;}
.controls{background:rgba(255,255,255,0.03);border-bottom:1px solid rgba(255,255,255,0.07);padding:10px 14px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.search-box{flex:1;min-width:140px;background:rgba(255,255,255,0.07);border:1px solid #444;border-radius:20px;padding:7px 14px;color:#fff;font-size:14px;outline:none;}
.search-box::placeholder{color:#555;}
.cat-scroll{display:flex;gap:6px;overflow-x:auto;padding:10px 14px;border-bottom:1px solid rgba(255,255,255,0.07);}
.cat-btn{border:none;border-radius:20px;padding:5px 13px;cursor:pointer;font-weight:700;font-size:11px;white-space:nowrap;background:rgba(255,255,255,0.07);color:#bbb;flex-shrink:0;transition:all 0.2s;}
.cat-btn.active{color:#000;}
.lang-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center;padding:8px 14px;border-bottom:1px solid rgba(255,255,255,0.07);background:rgba(255,255,255,0.02);}
.lang-toggle{border-radius:20px;padding:3px 11px;cursor:pointer;font-size:11px;font-weight:700;border:none;transition:all 0.2s;}
.content{max-width:680px;margin:0 auto;padding:12px 12px;}
.stats-bar{display:flex;gap:10px;align-items:center;margin-bottom:12px;flex-wrap:wrap;}
.stat{font-size:12px;color:#666;}
.word-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:8px;}
.word-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:11px 13px;}
.word-card:hover{border-color:rgba(255,107,53,0.3);}
.word-en{font-size:16px;font-weight:700;color:#FF6B35;margin-bottom:6px;display:flex;align-items:center;gap:8px;}
.word-type{font-size:10px;color:#666;background:rgba(255,255,255,0.06);border-radius:10px;padding:1px 7px;font-weight:600;letter-spacing:0.5px;}
.translations{display:flex;flex-direction:column;gap:4px;}
.trans-row{display:flex;align-items:center;gap:7px;}
.lang-badge{border-radius:12px;padding:1px 7px;font-size:10px;font-family:monospace;font-weight:700;flex-shrink:0;}
.trans-text{font-size:13px;color:#ccc;font-family:Georgia,serif;flex:1;}
.spk{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:50%;width:24px;height:24px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;transition:all 0.2s;}
.spk.p{background:#FF6B35;border-color:#FF6B35;}
.spk.pt{background:#4ECDC4;border-color:#4ECDC4;}
.no-results{text-align:center;padding:40px 20px;color:#555;font-size:15px;}
.load-more{display:block;width:calc(100% - 24px);max-width:680px;margin:16px auto;background:rgba(255,107,53,0.15);border:1px solid #FF6B35;border-radius:25px;padding:12px;color:#FF6B35;font-weight:700;font-size:14px;cursor:pointer;text-align:center;letter-spacing:1px;}
.back-btn{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,0.07);border:1px solid #444;border-radius:20px;padding:5px 14px;color:#aaa;font-size:12px;cursor:pointer;font-weight:700;text-decoration:none;}
.mode-bar{display:flex;gap:8px;padding:8px 14px;border-bottom:1px solid rgba(255,255,255,0.07);background:rgba(255,255,255,0.02);}
.mode-btn{border:none;border-radius:20px;padding:5px 14px;cursor:pointer;font-weight:700;font-size:12px;background:rgba(255,255,255,0.07);color:#888;transition:all 0.2s;}
.mode-btn.active{background:#FF6B35;color:#000;}
/* QUIZ MODE */
.wquiz-card{background:rgba(155,114,207,0.08);border:2px solid #9B72CF;border-radius:16px;padding:20px;margin-bottom:14px;text-align:center;}
.wquiz-word{font-size:28px;font-weight:900;color:#FF6B35;margin:10px 0 4px;}
.wquiz-type{font-size:11px;color:#777;margin-bottom:14px;}
.wquiz-opts{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px;}
.wquiz-opt{border-radius:10px;padding:12px 10px;cursor:pointer;font-size:13px;font-family:Georgia,serif;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);color:#ccc;transition:all 0.2s;}
.wquiz-opt.correct{background:rgba(78,205,196,0.15);border:1px solid #4ECDC4;color:#4ECDC4;}
.wquiz-opt.wrong{background:rgba(255,80,80,0.15);border:1px solid #f55;color:#f55;}
.wq-score{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.sq{border-radius:8px;padding:4px 12px;font-size:12px;}
.sq-g{background:rgba(78,205,196,0.12);border:1px solid #4ECDC4;color:#4ECDC4;}
.sq-o{background:rgba(255,107,53,0.12);border:1px solid #FF6B35;color:#FF6B35;}
.sq-gr{background:rgba(255,255,255,0.04);border:1px solid #444;color:#888;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
button:active{transform:scale(0.96)}
::-webkit-scrollbar{display:none}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <span style="font-size:22px">📖</span>
    <div>
      <h1>GlassLang · Palavras</h1>
      <div class="header-sub">1500 PALAVRAS MAIS COMUNS · 🔊 ÁUDIO · 4 LÍNGUAS</div>
    </div>
  </div>
  <a class="back-btn" onclick="history.back()">← Voltar ao App</a>
</div>

<div class="mode-bar">
  <button class="mode-btn active" id="modeList" onclick="setMode('list')">📚 Lista</button>
  <button class="mode-btn" id="modeQuiz" onclick="setMode('quiz')">🎯 Quiz de Palavras</button>
</div>

<div class="controls">
  <input class="search-box" id="searchBox" placeholder="🔍 Pesquisar palavra..." oninput="onSearch()">
  <button style="background:rgba(255,255,255,0.07);border:1px solid #444;border-radius:20px;padding:7px 14px;color:#aaa;cursor:pointer;font-size:12px;font-weight:700" onclick="document.getElementById('searchBox').value='';onSearch()">✕ Limpar</button>
</div>

<div class="lang-row">
  <span style="color:#666;font-size:11px">Mostrar:</span>
  <button class="lang-toggle" id="ltog-pt" onclick="toggleLang('pt')">🇧🇷 PT</button>
  <button class="lang-toggle" id="ltog-en" onclick="toggleLang('en')">🇬🇧 EN</button>
  <button class="lang-toggle" id="ltog-de" onclick="toggleLang('de')">🇩🇪 DE</button>
  <button class="lang-toggle" id="ltog-fr" onclick="toggleLang('fr')">🇫🇷 FR</button>
</div>

<div class="cat-scroll" id="catScroll"></div>

<div class="content">
  <div class="stats-bar">
    <span class="stat" id="statsText">Carregando...</span>
    <span id="ttsStatus" style="font-size:11px;color:#666">⏳ Carregando áudio...</span>
    <button id="speakAllBtn" onclick="toggleSpeakAll()" style="background:rgba(255,107,53,0.15);border:1px solid #FF6B35;border-radius:20px;padding:5px 14px;color:#FF6B35;cursor:pointer;font-size:12px;font-weight:700;white-space:nowrap">🔊 Ouvir Tudo</button>
    <button id="stopAllBtn" onclick="stopAll()" style="display:none;background:rgba(255,80,80,0.15);border:1px solid #f55;border-radius:20px;padding:5px 14px;color:#f55;cursor:pointer;font-size:12px;font-weight:700">⏹ Parar</button>
    <select id="speakLangSel" style="background:rgba(255,255,255,0.07);border:1px solid #444;border-radius:20px;padding:5px 10px;color:#ccc;font-size:12px;cursor:pointer;outline:none">
      <option value="en">🇬🇧 EN</option>
      <option value="pt">🇧🇷 PT</option>
      <option value="de">🇩🇪 DE</option>
      <option value="fr">🇫🇷 FR</option>
      <option value="all">Todas as línguas</option>
    </select>
  </div>

  <!-- LIST MODE -->
  <div id="listMode">
    <div class="word-grid" id="wordGrid"></div>
    <button class="load-more" id="loadMoreBtn" onclick="loadMore()" style="display:none">↓ CARREGAR MAIS PALAVRAS</button>
  </div>

  <!-- QUIZ MODE -->
  <div id="quizMode" style="display:none">
    <div class="wq-score">
      <div class="sq sq-g" id="wqOk">✅ 0</div>
      <div class="sq sq-gr" id="wqTotal">📊 0</div>
      <div class="sq sq-o" id="wqPct" style="display:none">🎯 0%</div>
    </div>
    <div class="config-bar" style="background:rgba(255,255,255,0.04);border-radius:12px;padding:10px 14px;margin-bottom:14px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
      <span style="color:#888;font-size:12px">Traduzir de:</span>
      <div id="wqFromBtns" style="display:flex;gap:6px;flex-wrap:wrap"></div>
      <span style="color:#888;font-size:12px">→ Para:</span>
      <div id="wqToBtns" style="display:flex;gap:6px;flex-wrap:wrap"></div>
    </div>
    <div id="wquizArea"></div>
  </div>
</div>

// ── TTS ROBUSTO ──────────────────────────────────────────────────────────────
const TTS_CODES={pt:"pt-BR",en:"en-US",de:"de-DE",fr:"fr-FR"};
const TTS_FALLBACK={
  pt:["pt-BR","pt-PT","pt"],
  en:["en-US","en-GB","en-AU","en"],
  de:["de-DE","de-AT","de-CH","de"],
  fr:["fr-FR","fr-BE","fr-CA","fr"]
};
let ttsVoices=[];

function loadVoices(){
  const vv=window.speechSynthesis.getVoices();
  if(vv&&vv.length>0) ttsVoices=[...vv];
  const el=document.getElementById('ttsStatus');
  if(el){
    if(ttsVoices.length>0){el.textContent='🔊 '+ttsVoices.length+' vozes prontas';el.style.color='#4ECDC4';}
    else{el.textContent='⚠️ Sem vozes de TTS';el.style.color='#f6ad55';}
  }
}

function getBestVoice(lang){
  if(ttsVoices.length===0) loadVoices();
  const tries=TTS_FALLBACK[lang]||[lang];
  for(const code of tries){
    const v=ttsVoices.find(v=>v.lang===code); if(v)return v;
  }
  for(const code of tries){
    const v=ttsVoices.find(v=>v.lang.startsWith(code.split('-')[0])); if(v)return v;
  }
  return ttsVoices[0]||null;
}

function speak(text,lang,btnId){
  if(!window.speechSynthesis) return;
  if(btnId){
    const btn=document.getElementById(btnId);
    if(btn&&btn.classList.contains('p')){
      window.speechSynthesis.cancel();
      btn.classList.remove('p','pt'); btn.textContent='🔊'; return;
    }
  }
  document.querySelectorAll('.spk').forEach(b=>{b.classList.remove('p','pt');b.textContent='🔊';});
  window.speechSynthesis.cancel();

  const fire=()=>{
    const u=new SpeechSynthesisUtterance(text);
    u.lang=TTS_CODES[lang]||'en-US';
    u.rate=0.82; u.pitch=1; u.volume=1;
    const v=getBestVoice(lang); if(v) u.voice=v;
    if(btnId){
      const btn=document.getElementById(btnId);
      if(btn){btn.classList.add('p');btn.textContent='⏸';}
      const done=()=>{const b=document.getElementById(btnId);if(b){b.classList.remove('p','pt');b.textContent='🔊';}};
      u.onend=done; u.onerror=done;
    }
    setTimeout(()=>{try{window.speechSynthesis.speak(u);}catch(e){}},80);
  };

  if(ttsVoices.length>0){ fire(); }
  else {
    let n=0;
    const poll=setInterval(()=>{
      loadVoices(); n+=200;
      if(ttsVoices.length>0||n>3000){clearInterval(poll);fire();}
    },200);
  }
}

function speakWord(text,lang){
  return new Promise(resolve=>{
    if(speakAllAbort){resolve();return;}
    if(!window.speechSynthesis){resolve();return;}
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang=TTS_CODES[lang]||'en-US';
    u.rate=0.82; u.pitch=1; u.volume=1;
    const v=getBestVoice(lang); if(v) u.voice=v;
    u.onend=()=>setTimeout(resolve,200);
    u.onerror=()=>setTimeout(resolve,200);
    setTimeout(()=>{try{window.speechSynthesis.speak(u);}catch(e){resolve();}},80);
  });
}

window.onload=function(){
  if(window.speechSynthesis){
    window.speechSynthesis.onvoiceschanged=loadVoices;
    loadVoices();
    setTimeout(loadVoices,600);
    setTimeout(loadVoices,1800);
  }
  buildCats(); buildLangToggles(); buildWQControls();
  renderList(); updateStats();
};

// ── FILTER
function getFiltered(){
  return RAW.filter(w=>{
    const catOk=currentCat==="Todas"||w[5]===currentCat;
    const q=searchQuery;
    const searchOk=!q||w[0].toLowerCase().includes(q)||w[1].toLowerCase().includes(q)||w[2].toLowerCase().includes(q)||w[3].toLowerCase().includes(q);
    return catOk&&searchOk;
  });
}

// ── RENDER
function renderList(){
  const filtered=getFiltered();
  const paged=filtered.slice(0,currentPage*PAGE_SIZE);
  const TYPES={n:"subst.",v:"verbo",adj:"adj.",adv:"adv.",prep:"prep.",conj:"conj.",pron:"pron.",num:"núm.",int:"expr."};
  document.getElementById('wordGrid').innerHTML=paged.map((w,i)=>{
    const id=`w${i}`;
    return `<div class="word-card">
      <div class="word-en">${w[0]} <span class="word-type">${TYPES[w[4]]||w[4]}</span></div>
      <div class="translations">
        ${activeLangs.map((l,li)=>{
          const vals=[w[1],w[2],w[3]];
          const langIdx=["pt","de","fr"].indexOf(l);
          const text=l==="en"?w[0]:langIdx>=0?vals[langIdx]:w[1];
          const sid=`${id}${l}`;
          return `<div class="trans-row">
            ${badge(l)}
            <span class="trans-text">${text}</span>
            <button class="spk" id="${sid}" onclick="speak('${text.replace(/'/g,"\\'")}','${l}','${sid}')">🔊</button>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');
  const loadBtn=document.getElementById('loadMoreBtn');
  loadBtn.style.display=paged.length<filtered.length?'block':'none';
  if(paged.length<filtered.length) loadBtn.textContent=`↓ CARREGAR MAIS (${filtered.length-paged.length} restantes)`;
}

function loadMore(){currentPage++;renderList();}

let speakAllActive=false;
let speakAllAbort=false;

function getLangText(w,lang){
  if(lang==="en")return w[0];
  if(lang==="pt")return w[1];
  if(lang==="de")return w[2];
  if(lang==="fr")return w[3];
}

// speakWord defined above

async function toggleSpeakAll(){
  if(speakAllActive){stopAll();return;}
  speakAllActive=true; speakAllAbort=false;
  const btn=document.getElementById('speakAllBtn');
  const stopBtn=document.getElementById('stopAllBtn');
  btn.textContent='⏸ A reproduzir...'; btn.style.background='rgba(255,107,53,0.35)';
  stopBtn.style.display='inline-block';

  const selLang=document.getElementById('speakLangSel').value;
  const filtered=getFiltered();
  const langs=selLang==='all'?["en","pt","de","fr"]:[selLang];

  for(let wi=0;wi<filtered.length;wi++){
    if(speakAllAbort)break;
    const w=filtered[wi];
    // highlight current card
    const cards=document.querySelectorAll('.word-card');
    cards.forEach(c=>c.style.borderColor='');
    // show progress
    btn.textContent=`⏸ ${wi+1}/${filtered.length} — ${w[0]}`;
    for(let li=0;li<langs.length;li++){
      if(speakAllAbort)break;
      const text=getLangText(w,langs[li]);
      await speakWord(text,langs[li]);
    }
    // pause between words
    if(!speakAllAbort) await new Promise(r=>setTimeout(r,300));
  }
  stopAll();
}

function stopAll(){
  speakAllAbort=true; speakAllActive=false;
  window.speechSynthesis&&window.speechSynthesis.cancel();
  const btn=document.getElementById('speakAllBtn');
  const stopBtn=document.getElementById('stopAllBtn');
  if(btn){btn.textContent='🔊 Ouvir Tudo';btn.style.background='rgba(255,107,53,0.15)';}
  if(stopBtn)stopBtn.style.display='none';
}

  document.getElementById('modeQuiz').className='mode-btn'+(m==='quiz'?' active':'');
  document.getElementById('listMode').style.display=m==='list'?'block':'none';
  document.getElementById('quizMode').style.display=m==='quiz'?'block':'none';
  if(m==='quiz') renderWQuiz();
}

// ── WORD QUIZ
function buildWQControls(){
  document.getElementById('wqFromBtns').innerHTML=ALL_LANGS.map(l=>{
    const c=LANG_COLORS[l],on=l===wqFrom;
    return `<button onclick="setWQFrom('${l}')" style="border-radius:20px;padding:2px 10px;cursor:pointer;font-size:11px;font-weight:700;border:1px solid ${on?c.bg:'#444'};background:${on?c.bg:'transparent'};color:${on?c.text:'#666'}">${c.label}</button>`;
  }).join('');
  document.getElementById('wqToBtns').innerHTML=ALL_LANGS.filter(l=>l!==wqFrom).map(l=>{
    const c=LANG_COLORS[l],on=l===wqTo;
    return `<button onclick="setWQTo('${l}')" style="border-radius:20px;padding:2px 10px;cursor:pointer;font-size:11px;font-weight:700;border:1px solid ${on?c.bg:'#444'};background:${on?c.bg:'transparent'};color:${on?c.text:'#666'}">${c.label}</button>`;
  }).join('');
}
function setWQFrom(l){wqFrom=l;if(l===wqTo)wqTo=ALL_LANGS.find(x=>x!==l);buildWQControls();renderWQuiz();}
function setWQTo(l){wqTo=l;buildWQControls();renderWQuiz();}

function getWordText(w,lang){
  if(lang==="en")return w[0];
  if(lang==="pt")return w[1];
  if(lang==="de")return w[2];
  if(lang==="fr")return w[3];
}

function renderWQuiz(){
  const pool=getFiltered().length>0?getFiltered():RAW;
  const word=pool[Math.floor(Math.random()*pool.length)];
  const correct=getWordText(word,wqTo);
  const wrongs=shuffle(pool.filter(w=>getWordText(w,wqTo)!==correct)).slice(0,3).map(w=>getWordText(w,wqTo));
  const opts=shuffle([correct,...wrongs]);
  const fromText=getWordText(word,wqFrom);
  const TYPES={n:"substantivo",v:"verbo",adj:"adjetivo",adv:"advérbio",prep:"preposição",conj:"conjunção",pron:"pronome",num:"número",int:"expressão"};
  window._wqCurrent={word,correct,opts};
  const c=LANG_COLORS[wqFrom];
  document.getElementById('wquizArea').innerHTML=`
    <div class="wquiz-card">
      <div style="display:flex;justify-content:center;align-items:center;gap:8px;margin-bottom:6px">
        ${badge(wqFrom)}
        <button class="spk" style="width:30px;height:30px;font-size:14px" onclick="speak('${fromText.replace(/'/g,"\\'")}','${wqFrom}','wqspk')" id="wqspk">🔊</button>
      </div>
      <div class="wquiz-word">${fromText}</div>
      <div class="wquiz-type">${TYPES[word[4]]||word[4]} · ${word[5]}</div>
    </div>
    <p style="color:#777;font-size:13px;margin-bottom:10px;text-align:center">Como se diz em ${badge(wqTo)}?</p>
    <div class="wquiz-opts">${opts.map((opt,i)=>`<button class="wquiz-opt" onclick="selectWQ(${i})">${opt}</button>`).join('')}</div>
    <div style="text-align:center;margin-top:14px" id="wqFB"></div>`;
  speak(fromText,wqFrom,'wqspk');
}

function selectWQ(i){
  const qc=window._wqCurrent; if(!qc)return;
  const ok=qc.opts[i]===qc.correct;
  wqScore.correct+=ok?1:0; wqScore.total++;
  document.getElementById('wqOk').textContent=`✅ ${wqScore.correct}`;
  document.getElementById('wqTotal').textContent=`📊 ${wqScore.total}`;
  const pct=document.getElementById('wqPct'); pct.style.display='block';
  pct.textContent=`🎯 ${Math.round(wqScore.correct/wqScore.total*100)}%`;
  document.querySelectorAll('.wquiz-opt').forEach((btn,j)=>{
    btn.onclick=null; btn.style.cursor='default';
    if(qc.opts[j]===qc.correct) btn.classList.add('correct');
    else if(j===i) btn.classList.add('wrong');
  });
  if(ok) speak(qc.correct,wqTo);
  document.getElementById('wqFB').innerHTML=`
    <div style="color:${ok?'#4ECDC4':'#f55'};font-size:15px;margin-bottom:10px">${ok?'✅ Correto!':'❌ Incorreto! Era: <strong style="color:#fff">'+qc.correct+'</strong>'}</div>
    <button style="background:#FF6B35;color:#000;border:none;border-radius:25px;padding:9px 24px;cursor:pointer;font-weight:800;font-size:13px" onclick="renderWQuiz()">PRÓXIMA →</button>`;
}
</script>
